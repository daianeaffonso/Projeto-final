<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de clientes - Caixa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles/style.css" />
</head>
<body>   
    <div class="app-container">
    <header>
        <div>
          <img src="logo.png" alt="Logo da Caixa" class="logo"/>
          <h2>Gerenciador de Clientes Caixa</h2>
        
        <div class="saudacao">
          <h4>Gestão de Clientes</h4>
        </div>

        <div>
            <form id="cadastro" class="mb-4" data-action="salvar">
              <input type="hidden" id="id"/>
              <input type="text" id="cliente" placeholder="Digite o nome do cliente" required />
              <input type="text" id="CPF" placeholder="CPF: ooo.ooo.ooo-oo" maxlength="14" required />
              <input type="email" id="email" placeholder="E-mail" required />

              <button type="submit" class="btn btn-primary" id="salvar">Salvar</button>
        
            </form>
        </div>
    </div>
    </header>

    <div class="row px-3" id="lista-clientes"></div>


  <h2>Gestão de contas</h2>
  
  <!-- Barra de seleção de clientes -->
  <select id="clienteSelect">
    <option value="">-- Escolha um cliente --</option>
  </select>

  <h3>Dados da Conta</h3>
  <div id="dadosConta"></div>

    <section class="extract">
        <div class="extract-header">
          <h3>Extrato Cliente</h3>
          <select id="filtro-tipo" onchange="renderizarExtrato()">
            <option value="todos">Todos</option>
            <option value="entrada">Entradas 💰</option>
            <option value="saida">Saídas 💸</option>
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Descrição</th>
            </tr>
          </thead>
          <tbody id="lista-transacoes">
            <!-- As linhas serão inseridas aqui via JS -->
          </tbody>
        </table>
      
        
    </section>

    <section class="actions">
      <button class="btn-edit" onclick="novaTransacao('deposito')">
        Editar Status da conta
      </button>
      <button class="btn-excl" onclick="novaTransacao('pagamento')">
        Deletar Conta
      </button>
    </section>

      <!-- <div id="filtros"></div> -->

        <footer>
          <p>Desenvolvido por Daiane Affonso de Oliveira v.01</p>
        </footer>

        <!-- <div id="total">Total: R$ 0</div> -->
      </div>
      </div>

        <script src="js/validacao.js"></script>
        <script src="js/api.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/main.js"></script>

</body>


</html>
