<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador Financeiro</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div id="app" class="container py-4">
    <h1 class="mb-4 text-center">Gerenciador Financeiro</h1>

    <!-- ================== CLIENTES ================== -->
    <section class="mb-5">
      <h2>Gestão de Clientes</h2>
      <form id="cadastro" class="mb-4" data-action="salvar">
        <input type="hidden" id="id" />

        <div class="row">
          <div class="col-md-4 mb-3">
            <label for="cliente" class="form-label">Nome</label>
            <input class="form-control" id="cliente" placeholder="Digite o nome do cliente" />
          </div>

          <div class="col-md-4 mb-3">
            <label for="CPF" class="form-label">CPF</label>
            <input class="form-control" id="CPF" placeholder="Digite o CPF" />
          </div>

          <div class="col-md-4 mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Digite o email" />
          </div>
        </div>

        <button type="submit" class="btn btn-success" id="salvar">Salvar Cliente</button>
      </form>

      <div class="row" id="lista-clientes"></div>
    </section>

    <!-- ================== CONTAS ================== -->
    <section class="mb-5">
        <h2>Gestão de Contas</h2>
          <p>Clientes:</p>

            <div id="dadosConta"></div>
            <!-- Lista de contas renderizada dinamicamente -->
            <div id="lista-contas" class="row"></div>
    </section>

<!-- ================== TRANSAÇÕES ================== -->
<section>
  <h2>Transações</h2>
  <form id="form-transacao" class="mb-4">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="contaId" class="form-label">Conta</label>
        <select class="form-select" id="contaId">
          <option value="">Selecione a conta</option>
          <!-- opções preenchidas dinamicamente -->
        </select>
      </div>

      <div class="col-md-4 mb-3">
        <label for="tipoTransacao" class="form-label">Tipo</label>
        <select class="form-select" id="tipoTransacao">
          <option value="">Selecione</option>
          <option value="deposito">Depósito</option>
          <option value="saque">Saque</option>
          <option value="pagamento">Pagamento</option>
        </select>
      </div>

      <div class="col-md-4 mb-3">
        <label for="valor" class="form-label">Valor</label>
        <input type="number" class="form-control" id="valor" placeholder="Digite o valor" />
      </div>
    </div>

    <button type="submit" class="btn btn-warning">Registrar Transação</button>
  </form>

  <h3>Extrato</h3>
  <table class="table">
    <thead>
      <tr>
        <th>Data</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Descrição</th>
        <th>Saldo Novo</th>
      </tr>
    </thead>
    <tbody id="lista-transacoes"></tbody>
  </table>
</section>
      <footer>
        <p>Desenvolvido por Daiane Affonso de Oliveira v.01</p>
      </footer>
  </div>
  
  <script src="js/validacao.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
